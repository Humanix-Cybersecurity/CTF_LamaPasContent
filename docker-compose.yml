services:
  ollama:
    image: ollama/ollama:latest
    container_name: llmctf-ollama
    volumes:
      - ollama-data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - LLM_CTF_MODEL=${LLM_CTF_MODEL:-qwen2.5:3b}
      - LLM_CTF_EMBED_MODEL=${LLM_CTF_EMBED_MODEL:-all-minilm}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/model-ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 10s
    networks: [ctfnet]

  app:
    build: ./app
    container_name: llmctf-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_CTF_MODEL=${LLM_CTF_MODEL:-qwen2.5:3b}
      - LLM_CTF_EMBED_MODEL=${LLM_CTF_EMBED_MODEL:-all-minilm}
    # Montage du code en direct + hot-reload : itération sans rebuild.
    # (En prod, l'image contient déjà le même code via COPY.)
    volumes:
      - ./app:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      ollama:
        condition: service_healthy
    networks: [ctfnet]

volumes:
  ollama-data:

networks:
  ctfnet:
